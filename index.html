<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puzzle Buddies Island</title>
<style>
body{font-family:Arial;margin:0;background:#e6f7ff}
.wrap{max-width:900px;margin:auto;padding:16px}
button{padding:12px 16px;border:none;border-radius:12px;background:#2563eb;color:#fff;cursor:pointer}
.alt{background:#fff;color:#000;border:1px solid #ccc}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.card{background:#fff;padding:16px;border-radius:16px;text-align:center}
.memory-card{font-size:30px;height:70px;display:flex;align-items:center;justify-content:center;background:#7dd3fc;border-radius:12px}
.memory-card.on{background:#fde68a}
</style>
</head>
<body>
<div class="wrap">
<h1>Puzzle Buddies Island</h1>
<div id="app"></div>
</div>
<script>
let state={screen:'menu',cards:[],picked:[],busy:false};

function shuffle(a){return a.sort(()=>Math.random()-0.5)}

function render(){
if(state.screen==='menu'){
app.innerHTML=`
<div class="card">
<h2>Start Game</h2>
<button onclick="startMemory()">Play Memory</button>
</div>`
}
if(state.screen==='memory'){
app.innerHTML=`
<div>
<button class="alt" onclick="goHome()">Home</button>
<div class="grid">
${state.cards.map(c=>`<div class="memory-card ${c.on?'on':''}" onclick="flip(${c.id})">${c.on||c.m?c.v:'❓'}</div>`).join('')}
</div>
</div>`
}
}

function goHome(){state.screen='menu';render()}

function startMemory(){
let icons=['🐶','🐱','🐸','🐵'];
let deck=shuffle([...icons,...icons]);
state.cards=deck.map((v,i)=>({id:i,v,on:false,m:false}))
state.picked=[]
state.screen='memory'
render()
}

function flip(id){
if(state.busy)return
let c=state.cards.find(x=>x.id===id)
if(c.on||c.m)return
c.on=true
state.picked.push(c)
render()
if(state.picked.length===2){
state.busy=true
let [a,b]=state.picked
if(a.v===b.v){a.m=b.m=true;resetPick()}
else setTimeout(()=>{a.on=b.on=false;resetPick()},800)
}
}

function resetPick(){state.picked=[];state.busy=false;render()}

render()
</script>
</body>
</html>
